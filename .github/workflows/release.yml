name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, don't publish to GitHub Releases"
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Determine version & whether to publish ──────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      dry_run: ${{ steps.check.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          VERSION=$(node -p "require('./desktop/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building v$VERSION"
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "dry_run=true" >> $GITHUB_OUTPUT
          else
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

  # ── macOS x64 (Intel runner — avoids cross-compile for Python deps) ──────────
  build-mac-x64:
    needs: prepare
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install renderer dependencies
        working-directory: desktop/app
        run: npm ci

      - name: Build renderer
        working-directory: desktop/app
        run: npm run build

      - name: Fetch Python runtime (x64)
        working-directory: desktop
        run: node scripts/fetch-python-runtime.js mac-x64

      - name: Build macOS (x64)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [[ "${{ needs.prepare.outputs.dry_run }}" == "true" ]]; then
            npx electron-builder --mac --x64 --publish never
          else
            npx electron-builder --mac --x64 --publish always
          fi

      - uses: actions/upload-artifact@v4
        if: needs.prepare.outputs.dry_run == 'true'
        with:
          name: mac-x64-artifacts
          path: desktop/dist/*.dmg

  # ── macOS arm64 (Apple Silicon runner) ────────────────────────────────────
  build-mac-arm64:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install renderer dependencies
        working-directory: desktop/app
        run: npm ci

      - name: Build renderer
        working-directory: desktop/app
        run: npm run build

      - name: Fetch Python runtime (arm64)
        working-directory: desktop
        run: node scripts/fetch-python-runtime.js mac-arm64

      - name: Build macOS (arm64)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [[ "${{ needs.prepare.outputs.dry_run }}" == "true" ]]; then
            npx electron-builder --mac --arm64 --publish never
          else
            npx electron-builder --mac --arm64 --publish always
          fi

      - uses: actions/upload-artifact@v4
        if: needs.prepare.outputs.dry_run == 'true'
        with:
          name: mac-arm64-artifacts
          path: desktop/dist/*.dmg

  # ── Windows ─────────────────────────────────────────────────────────────────
  build-win:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install renderer dependencies
        working-directory: desktop/app
        run: npm ci

      - name: Build renderer
        working-directory: desktop/app
        run: npm run build

      - name: Fetch Python runtime
        working-directory: desktop
        run: node scripts/fetch-python-runtime.js win-x64

      - name: Build Windows (x64)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ needs.prepare.outputs.dry_run }}" -eq "true") {
            npx electron-builder --win --x64 --publish never
          } else {
            npx electron-builder --win --x64 --publish always
          }

      - uses: actions/upload-artifact@v4
        if: needs.prepare.outputs.dry_run == 'true'
        with:
          name: win-artifacts
          path: desktop/dist/*.exe
