name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, don't publish to GitHub Releases"
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Determine version, dry-run flag, and create the GitHub release ───────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      dry_run: ${{ steps.check.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v7

      - id: ver
        run: |
          VERSION=$(node -p "require('./desktop/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building v$VERSION"

      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "dry_run=true" >> $GITHUB_OUTPUT
          else
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      # Update the existing release (if any) or create a new one.
      # Using edit-or-create avoids the 422 "tag already exists" error that
      # occurs when the tag exists but we try to gh release create again.
      - name: Create or update GitHub release
        if: steps.check.outputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          REPO="${{ github.repository }}"
          # Try to update an existing release; fall back to creating one
          gh release edit "v${VERSION}" \
            --title "v${VERSION}" \
            --latest \
            --repo "$REPO" 2>/dev/null || \
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Desktop app — Windows (x64 installer + portable) and macOS (Intel x64 + Apple Silicon). Self-contained: bundles a Python runtime, no system Python required." \
            --latest \
            --target "$GITHUB_SHA" \
            --repo "$REPO"

  # ── macOS (x64 then arm64 on the same runner) ────────────────────────────────
  build-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install renderer dependencies
        working-directory: desktop/app
        run: npm ci

      - name: Build renderer
        working-directory: desktop/app
        run: npm run build

      - name: Fetch Python runtime (x64)
        working-directory: desktop
        run: node scripts/fetch-python-runtime.js mac-x64

      - name: Build macOS (x64)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never

      - name: Fetch Python runtime (arm64)
        working-directory: desktop
        run: node scripts/fetch-python-runtime.js mac-arm64

      - name: Build macOS (arm64)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload macOS release assets
        if: needs.prepare.outputs.dry_run == 'false'
        working-directory: desktop/dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.prepare.outputs.version }}"
          REPO="${{ github.repository }}"
          FILES=()
          for f in \
            morpheus-x64.dmg   morpheus-x64.dmg.blockmap \
            morpheus-arm64.dmg morpheus-arm64.dmg.blockmap \
            morpheus-x64.zip   morpheus-x64.zip.blockmap \
            morpheus-arm64.zip morpheus-arm64.zip.blockmap \
            latest-mac.yml; do
            [ -f "$f" ] && FILES+=("$f")
          done
          gh release upload "$VERSION" "${FILES[@]}" --clobber --repo "$REPO"

      - uses: actions/upload-artifact@v4
        if: needs.prepare.outputs.dry_run == 'true'
        with:
          name: mac-artifacts
          path: desktop/dist/*.dmg

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-win:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install renderer dependencies
        working-directory: desktop/app
        run: npm ci

      - name: Build renderer
        working-directory: desktop/app
        run: npm run build

      - name: Fetch Python runtime
        working-directory: desktop
        run: node scripts/fetch-python-runtime.js win-x64

      - name: Build Windows (x64)
        working-directory: desktop
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows release assets
        if: needs.prepare.outputs.dry_run == 'false'
        working-directory: desktop/dist
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.prepare.outputs.version }}"
          REPO="${{ github.repository }}"
          FILES=()
          for f in \
            morpheus-setup.exe    morpheus-setup.exe.blockmap \
            morpheus-portable.exe \
            latest.yml; do
            [ -f "$f" ] && FILES+=("$f")
          done
          gh release upload "$VERSION" "${FILES[@]}" --clobber --repo "$REPO"

      - uses: actions/upload-artifact@v4
        if: needs.prepare.outputs.dry_run == 'true'
        with:
          name: win-artifacts
          path: desktop/dist/*.exe

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install system dependencies
        run: sudo apt-get install -y libarchive-tools rpm

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install renderer dependencies
        working-directory: desktop/app
        run: npm ci

      - name: Build renderer
        working-directory: desktop/app
        run: npm run build

      - name: Fetch Python runtime
        working-directory: desktop
        run: node scripts/fetch-python-runtime.js linux-x64

      - name: Build Linux (x64)
        working-directory: desktop
        run: npx electron-builder --linux --x64 --publish never

      - name: Upload Linux release assets
        if: needs.prepare.outputs.dry_run == 'false'
        working-directory: desktop/dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.prepare.outputs.version }}"
          REPO="${{ github.repository }}"
          FILES=()
          for f in \
            morpheus-x64.AppImage \
            morpheus-amd64.deb \
            latest-linux.yml; do
            [ -f "$f" ] && FILES+=("$f")
          done
          gh release upload "$VERSION" "${FILES[@]}" --clobber --repo "$REPO"

      - uses: actions/upload-artifact@v4
        if: needs.prepare.outputs.dry_run == 'true'
        with:
          name: linux-artifacts
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
