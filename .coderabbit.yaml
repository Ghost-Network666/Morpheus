language: "en-US"
tone_instructions: "Be direct and concise. Focus on security, correctness, and performance issues. Skip style nitpicks."
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"

  path_filters:
    - "!**/dist/**"
    - "!**/__pycache__/**"
    - "!**/node_modules/**"
    - "!**/python-runtime/**"
    - "!**/*.pyc"
    - "!**/*.min.js"
    - "!**/package-lock.json"

chat:
  auto_reply: true

code_generation:
  docstrings:
    language: "en-US"
