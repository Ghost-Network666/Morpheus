version: "3.9"

services:
  morpheus:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: morpheus
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - morpheus_data:/data
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=7860
      - OLLAMA_URL=http://host.docker.internal:11434
      - SEARXNG_URL=http://searxng:8080
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_IN_PROCESS=false
      - NTFY_URL=http://ntfy:80
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      searxng:
        condition: service_started
      chromadb:
        condition: service_healthy
    networks:
      - morpheus_net
    deploy:
      resources:
        limits:
          memory: 2g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  searxng:
    image: searxng/searxng:latest
    container_name: morpheus_searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - morpheus_net
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  chromadb:
    image: chromadb/chroma:latest
    container_name: morpheus_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - morpheus_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: morpheus_ntfy
    restart: unless-stopped
    ports:
      - "8082:80"
    command: serve
    networks:
      - morpheus_net
    deploy:
      resources:
        limits:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  morpheus_data:
  searxng_data:
  chroma_data:

networks:
  morpheus_net:
    driver: bridge
