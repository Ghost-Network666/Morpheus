appId: com.ghostnetwork.morpheus
productName: Morpheus
copyright: Copyright © 2025 Ghost Network

directories:
  buildResources: assets
  output: dist
  app: "."

# Consistent artifact naming (no version in filename for stable download links)
artifactName: morpheus-${arch}.${ext}

# Bundle the Python backend + a self-contained Python runtime + app icons
# (must be outside asar for native tray API and to spawn the backend process).
# python-runtime/ is generated by `node scripts/fetch-python-runtime.js <target>`
# before packaging — it ships with all backend dependencies pre-installed, so
# the app never depends on a system Python install.
extraResources:
  - from: ../morpheus
    to: app
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/*.pyo"
      - "!venv/**"
      - "!.venv/**"
      - "!data/**"
      - "!.env"
      - "!tests/**"
      - "!.git/**"
      - "!dist/**"
      - "!*.egg-info/**"
      - "!app/static/**" # <-- exclude the web UI from the extraResources bundle
  - from: python-runtime
    to: python-runtime
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
  - from: assets
    to: assets
    filter:
      - "icon.png"
      - "icon.ico"
      - "icon.icns"

files:
  - src/**/*
  - app/static/**/*
  - "!app/src/**"
  - "!app/node_modules/**"
  - "!app/package.json"
  - "!app/package-lock.json"
  - "!app/tsconfig*.json"
  - "!app/vite.config.ts"
  - "!app/postcss.config.js"
  - "!app/tailwind.config.js"
  - "!app/index.html"

# ── Windows ───────────────────────────────────────────────────────────
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Morpheus
  artifactName: morpheus-setup.${ext}

portable:
  artifactName: morpheus-portable.${ext}

# ── macOS ────────────────────────────────────────────────────────────
mac:
  icon: assets/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  title: "Morpheus ${version}"
  artifactName: morpheus-${arch}.${ext}
  background: null
  # Minimal for CI to avoid .background/background.tiff FileNotFound on GitHub macOS

# ── Linux ─────────────────────────────────────────────────────────────────
linux:
  icon: assets/icon.png
  category: Utility
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

# ── Publish to GitHub Releases ─────────────────────────────────────────────
publish:
  provider: github
  owner: Ghost-Network666
  repo: Morpheus
  releaseType: release
