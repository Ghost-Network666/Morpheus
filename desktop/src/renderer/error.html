<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'">
<title>Morpheus — Error</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 500px; height: 400px;
    background: #1e1e2e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #cdd6f4;
    overflow: hidden;
  }
  .card {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    -webkit-app-region: drag;
  }
  .icon { font-size: 36px; color: #f38ba8; }
  h2 { font-size: 18px; font-weight: 600; color: #f38ba8; }
  .msg {
    font-size: 13px;
    color: #a6adc8;
    text-align: center;
    max-width: 420px;
    line-height: 1.5;
    word-break: break-word;
    background: #181825;
    border: 1px solid #313244;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: monospace;
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  button {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid #313244;
    background: #313244;
    color: #cdd6f4;
    font-size: 13px;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }
  button:hover { background: #45475a; }
  button.primary { background: #cba6f7; color: #1e1e2e; border-color: #cba6f7; }
  button.primary:hover { background: #d4b8fa; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚠</div>
  <h2>Failed to start Morpheus</h2>
  <div class="msg" id="msg">An unexpected error occurred.</div>
  <div class="btn-row">
    <button class="primary" onclick="window.electronAPI.retrySetup()">Retry</button>
    <button onclick="window.electronAPI.quitApp()">Quit</button>
  </div>
</div>
<script>
  window.electronAPI?.onErrorMessage(msg => {
    document.getElementById("msg").textContent = msg;
  });
</script>
</body>
</html>
